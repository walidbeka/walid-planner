name: Daily Reminder Email

on:
  schedule:
    - cron: '0 6 * * *'   # 9:00 صباحاً بتوقيت مصر
  workflow_dispatch:

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Send daily reminder email
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node .github/workflows/send-email.mjs
