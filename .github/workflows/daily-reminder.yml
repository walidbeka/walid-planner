name: Daily Reminder Email

on:
  schedule:
    - cron: '15 6 * * *'  # 9:15 Cairo summer (6:15 UTC) - بعد الـ client-side بـ 15 دقيقة
  workflow_dispatch:

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Send daily reminder email
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node .github/workflows/send-email.mjs
